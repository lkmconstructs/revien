name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core + dev + semantic)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      # fastembed defaults to /tmp/fastembed_cache; cache THAT path so the
      # ~65MB bge-small model downloads once, not on every run. FASTEMBED_CACHE_PATH
      # pins it so the cache action and the model loader always agree.
      - name: Cache the fastembed model
        uses: actions/cache@v4
        with:
          path: /tmp/fastembed_cache
          key: fastembed-bge-small-${{ runner.os }}

      - name: Run the test suite
        env:
          FASTEMBED_CACHE_PATH: /tmp/fastembed_cache
        run: pytest tests revien_bench/tests -q
