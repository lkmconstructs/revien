name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    # Windows runners are markedly slower than ubuntu (cold pip cache, slower
    # fs) — a generous ceiling so a slow leg fails loudly instead of hanging
    # the default 360-minute job limit.
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core + dev + semantic)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      # FASTEMBED_CACHE_PATH pins where the ~65MB bge-small model lands so
      # the cache action and the model loader always agree. runner.temp
      # resolves per-OS (/tmp-ish on ubuntu, D:\ on windows), so one stanza
      # covers the whole matrix.
      - name: Cache the fastembed model
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/fastembed_cache
          key: fastembed-bge-small-${{ runner.os }}

      - name: Run the test suite
        env:
          FASTEMBED_CACHE_PATH: ${{ runner.temp }}/fastembed_cache
        run: pytest tests revien_bench/tests -q
